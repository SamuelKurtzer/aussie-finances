name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (wasm32)
        run: cargo clippy -p aus-fin --target wasm32-unknown-unknown -- -D warnings
      - name: Run tests
        run: cargo test -p aus-fin
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14
      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build web release
        run: trunk build --release

  version-guard:
    # On tags, refuse to build bundles whose internal version disagrees with
    # the tag. Also runs (as a no-op) on manual dispatch so the needs: chain
    # of the build jobs is satisfied there too.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches Cargo.toml and tauri.conf.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          TAURI_CARGO=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          TAURI=$(jq -r .version src-tauri/tauri.conf.json)
          echo "tag=$TAG cargo=$CARGO tauri-cargo=$TAURI_CARGO tauri.conf=$TAURI"
          if [ "$TAG" != "$CARGO" ] || [ "$TAG" != "$TAURI" ] || [ "$TAG" != "$TAURI_CARGO" ]; then
            echo "::error::Release version mismatch: tag v$TAG vs Cargo.toml $CARGO, src-tauri/Cargo.toml $TAURI_CARGO, tauri.conf.json $TAURI. Bump all to match before tagging."
            exit 1
          fi

  desktop-linux:
    # Bundles are only built for tags and manual runs; tests cover pushes.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [version-guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk and tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14,tauri-cli@2.11.4
      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build desktop bundles
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage

  android-apk:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [version-guard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018" "platforms;android-34" "build-tools;34.0.0"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk and tauri-cli
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14,tauri-cli@2.11.4
      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build debug APK (debug-signed, installable)
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: cargo tauri android build --debug --target aarch64 --apk
      - name: Decode signing keystore
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"
      - name: Build release APK (signed)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: cargo tauri android build --target aarch64 --apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [desktop-linux, android-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.apk

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk@0.21.14
      - name: Ensure cargo bin on PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build web release for Pages
        run: trunk build --release --public-url /aussie-finances/
      - uses: actions/configure-pages@v5
        with:
          # Create the Pages site on first deploy so no manual settings
          # flip is needed; needs the job's pages: write permission.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

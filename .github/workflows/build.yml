name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test -p aus-fin
      - name: Install trunk
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y trunk
      - name: Build web release
        run: trunk build --release

  desktop-linux:
    # Bundles are only built for tags and manual runs; tests cover pushes.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y trunk tauri-cli
      - name: Build desktop bundles
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/appimage/*.AppImage

  android-apk:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018" "platforms;android-34" "build-tools;34.0.0"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y trunk tauri-cli
      - name: Build debug APK (debug-signed, installable)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: cargo tauri android build --debug --target aarch64 --apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk

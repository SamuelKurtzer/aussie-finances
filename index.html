<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aus Fin</title>
    <link data-trunk rel="rust" data-bin="aus-fin" />
    <style>
      :root {
        --bg: #0b0b09;
        --surface: #11110e;
        --panel: #161613;
        --ink: #d6d3c4;
        --muted: #8a8672;
        --line: #33322a;
        --line-strong: #4c4a3a;
        --field: #0d0d0b;
        --field-border: #3c3a2e;
        --accent: #ffb000;
        --accent-dim: #8a6200;
        --accent-ink: #141200;
        --error: #e06c75;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Berkeley Mono", "JetBrains Mono", "IBM Plex Mono", ui-monospace,
          "SF Mono", Menlo, Consolas, monospace;
        font-size: 13.5px;
        line-height: 1.5;
        color: var(--ink);
        background: var(--bg);
        font-variant-numeric: tabular-nums;
      }
      ::selection {
        background: var(--accent);
        color: var(--accent-ink);
      }
      h1 {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-left: 3px solid var(--accent);
        padding-left: 0.6rem;
        margin: 0.4rem 0;
      }
      h2 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.35rem;
        margin: 0.4rem 0 0.7rem;
      }
      h2::before, h3::before {
        content: "// ";
        color: var(--accent-dim);
      }
      h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 1rem 0 0.5rem;
      }
      p {
        margin: 0.3rem 0 0.8rem;
      }
      .site {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.1rem;
      }
      .tabs {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
        margin: 0;
        padding: 0;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .tabs a {
        text-decoration: none;
        color: var(--muted);
        border: 0;
        border-right: 1px solid var(--line);
        padding: 0.5rem 0.9rem;
        background: transparent;
        text-transform: uppercase;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
      }
      .tabs a:hover {
        color: var(--ink);
        background: #1c1c17;
      }
      .tabs a[aria-current="page"] {
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 700;
      }
      .workspace {
        border: 1px solid var(--line);
      }
      .workspace-body {
        background: var(--surface);
        padding: 0.95rem 1rem;
      }
      .hero {
        margin-bottom: 0.75rem;
      }
      .hero p {
        font-size: 0.85rem;
      }
      .income-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        align-items: start;
      }
      .panel {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }
      .field-group {
        padding: 0.35rem 0 1.1rem;
        border-bottom: 1px dashed var(--line);
      }
      .field-group:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 0.3rem;
      }
      .check-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.2rem 0 0.9rem;
        font-weight: 600;
      }
      input, select {
        width: 100%;
        font: inherit;
        padding: 0.4rem 0.5rem;
        border-radius: 0;
        border: 1px solid var(--field-border);
        background: var(--field);
        color: var(--ink);
        margin-bottom: 0.9rem;
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
      }
      input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin: 0;
        accent-color: var(--accent);
      }
      button {
        font: inherit;
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid var(--accent);
        border-radius: 0;
        padding: 0.35rem 0.7rem;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      button:hover {
        background: #ffc23d;
        border-color: #ffc23d;
      }
      button.secondary {
        background: transparent;
        color: var(--ink);
        border-color: var(--line-strong);
      }
      button.secondary:hover {
        background: #1c1c17;
        border-color: var(--muted);
      }
      .button-row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        border-bottom: 1px solid var(--line-strong);
      }
      th, td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 0.35rem 0.45rem;
      }
      tbody tr:hover {
        background: #1a1a14;
      }
      .muted {
        color: var(--muted);
      }
      .badge {
        color: var(--accent);
        background: transparent;
        border: 1px solid var(--accent);
        display: inline-block;
        padding: 0.1rem 0.45rem;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .error {
        color: var(--error);
        margin: 0.25rem 0 1rem;
      }
      .warning-list {
        margin: 0.4rem 0 0.9rem;
        padding-left: 1.2rem;
        color: var(--error);
        font-size: 0.85rem;
      }
      .mortgage-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.1fr 0.9fr;
        align-items: start;
      }
      .row-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
      }
      .three-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.7rem;
      }
      .four-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.7rem;
      }
      .split-block {
        border: 1px solid var(--line);
        padding: 0.7rem;
        margin-bottom: 0.8rem;
        background: var(--panel);
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.5rem;
        margin-bottom: 0.8rem;
      }
      .mini-card {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        border: 1px solid var(--line);
        padding: 0.5rem 0.6rem;
        background: var(--panel);
      }
      .mini-card .muted {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .mini-card strong {
        font-size: 1rem;
        color: var(--accent);
      }
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.7rem;
      }
      .chart-block {
        padding: 0.25rem 0;
      }
      .line-chart {
        width: 100%;
        height: auto;
      }
      .axis {
        stroke: var(--line-strong);
        stroke-width: 1;
      }
      .axis-grid {
        stroke: #24231d;
        stroke-width: 1;
        stroke-dasharray: 1 4;
      }
      .series-line {
        stroke-width: 2;
        stroke-linecap: butt;
        stroke-linejoin: miter;
      }
      .axis-label {
        fill: var(--muted);
        font-size: 17px;
        font-weight: 600;
      }
      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-bottom: 0.55rem;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 1rem;
        color: var(--muted);
      }
      .chart-toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem 0.9rem;
        margin: 0.2rem 0 0.55rem;
      }
      .chart-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.42rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .chart-toggle input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .chart-toggles.in-readout {
        margin: 0.5rem 0 0.65rem;
      }
      .legend-swatch {
        width: 10px;
        height: 10px;
      }
      .info-tip {
        position: relative;
        display: inline-block;
        color: var(--muted);
        cursor: help;
        margin-left: 0.4rem;
        font-size: 0.85em;
        text-transform: none;
        letter-spacing: normal;
      }
      .info-tip:hover,
      .info-tip:focus {
        color: var(--accent);
        outline: none;
      }
      .info-tip-body {
        display: none;
        position: absolute;
        left: 0;
        bottom: 1.5em;
        z-index: 10;
        width: 320px;
        max-width: 72vw;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        padding: 0.5rem 0.6rem;
        color: var(--ink);
        font-size: 0.95em;
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
        white-space: normal;
        line-height: 1.45;
      }
      .info-tip:hover .info-tip-body,
      .info-tip:focus .info-tip-body {
        display: block;
      }
      details.fine-print summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0.6rem 0 0.3rem;
      }
      .pie-wrap {
        display: flex;
        gap: 1.2rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .pie-chart {
        width: 240px;
        height: 240px;
        flex: 0 0 auto;
      }
      .pie-slice {
        stroke: var(--bg);
        stroke-width: 2;
      }
      .pie-legend {
        margin-top: 0;
        min-width: 300px;
        flex: 1;
      }
      .hover-guide {
        stroke: var(--muted);
        stroke-width: 1;
        stroke-dasharray: 3 4;
      }
      .hover-readout {
        margin-top: 0.55rem;
        border: 1px solid var(--line);
        padding: 0.5rem 0.6rem;
        background: var(--panel);
        font-size: 0.95rem;
      }
      .hover-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .hover-row strong {
        margin-left: auto;
      }
      .table-wrap {
        max-height: 520px;
        overflow-y: auto;
        overflow-x: auto;
        border: 1px solid var(--line);
      }
      .spreadsheet-wrap {
        max-height: 600px;
        overflow: auto;
        border: 1px solid var(--line);
      }
      .spreadsheet-wrap table {
        white-space: nowrap;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--surface);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line-strong);
        border: 2px solid var(--surface);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }
      .spreadsheet-wrap thead th {
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 1;
      }
      @media (max-width: 720px) {
        .site { padding: 0.75rem; }
        .tabs {
          gap: 0.5rem;
          padding: 0.6rem 0.6rem 0.25rem;
        }
        .workspace-body {
          padding: 0.75rem;
        }
        .mortgage-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body></body>
</html>

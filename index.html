<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aus Fin</title>
    <link data-trunk rel="rust" data-bin="aus-fin" />
    <style>
      :root {
        --bg: #090d16;
        --surface: #131a2b;
        --ink: #ecf2ff;
        --accent: #25c59a;
        --accent-ink: #04110d;
        --muted: #9ea9c2;
        --line: #2a3654;
        --field: #0f1524;
        --field-border: #314163;
        --focus: #56d9b4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      .site {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.1rem;
      }
      .tabs {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin: 0;
        padding: 0.6rem 0.75rem 0;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #18233a 0%, #141d31 100%);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
      }
      .tabs a {
        text-decoration: none;
        color: var(--ink);
        border: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        padding: 0.5rem 0.9rem;
        background: #1a2640;
        margin-bottom: -1px;
        transition: border-color 160ms ease, background-color 160ms ease;
      }
      .tabs a:hover {
        border-color: var(--focus);
        background: #233251;
      }
      .tabs a[aria-current="page"] {
        background: var(--surface);
        color: var(--ink);
        border-color: var(--line);
        border-bottom-color: var(--surface);
        position: relative;
        z-index: 2;
      }
      .workspace {
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 10px 34px #00000030;
      }
      .workspace-body {
        background: var(--surface);
        padding: 0.95rem 1rem;
      }
      .hero {
        margin-bottom: 0.75rem;
      }
      .income-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        align-items: start;
      }
      .panel {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }
      .field-group {
        padding: 0.35rem 0 1.1rem;
        border-bottom: 1px solid #233251;
      }
      .field-group:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }
      .check-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.2rem 0 0.9rem;
        font-weight: 600;
      }
      input, select {
        width: 100%;
        padding: 0.55rem;
        border-radius: 8px;
        border: 1px solid var(--field-border);
        background: var(--field);
        color: var(--ink);
        margin-bottom: 0.9rem;
      }
      input:focus, select:focus {
        outline: 2px solid var(--focus);
        outline-offset: 0;
        border-color: var(--focus);
      }
      input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin: 0;
        accent-color: var(--accent);
      }
      button {
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid #40d7b0;
        border-radius: 8px;
        padding: 0.45rem 0.7rem;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: #1a2640;
        color: var(--ink);
        border-color: var(--line);
      }
      .button-row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      th, td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 0.45rem;
      }
      .muted {
        color: var(--muted);
      }
      .badge {
        color: var(--accent-ink);
        background: var(--accent);
        border-radius: 999px;
        display: inline-block;
        padding: 0.22rem 0.62rem;
        font-size: 0.8rem;
        font-weight: 700;
      }
      .error {
        color: #ff9da1;
        margin: 0.25rem 0 1rem;
      }
      .mortgage-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.1fr 0.9fr;
        align-items: start;
      }
      .row-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
      }
      .three-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.7rem;
      }
      .four-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.7rem;
      }
      .split-block {
        border: 1px solid #243457;
        border-radius: 10px;
        padding: 0.7rem;
        margin-bottom: 0.8rem;
        background: #10182a44;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 0.65rem;
        margin-bottom: 0.8rem;
      }
      .mini-card {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        border: 1px solid #243457;
        border-radius: 10px;
        padding: 0.6rem;
        background: #10182a44;
      }
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.7rem;
      }
      .chart-block {
        padding: 0.25rem 0;
      }
      .line-chart {
        width: 100%;
        height: auto;
      }
      .axis {
        stroke: #3a4f7b;
        stroke-width: 1;
      }
      .axis-grid {
        stroke: #26375a;
        stroke-width: 1;
        stroke-dasharray: 2 4;
      }
      .series-line {
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .axis-label {
        fill: var(--muted);
        font-size: 18px;
        font-weight: 600;
      }
      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-bottom: 0.55rem;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 1rem;
        color: var(--muted);
      }
      .chart-toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem 0.9rem;
        margin: 0.2rem 0 0.55rem;
      }
      .chart-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.42rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .chart-toggle input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .chart-toggles.in-readout {
        margin: 0.5rem 0 0.65rem;
      }
      .legend-swatch {
        width: 13px;
        height: 13px;
        border-radius: 3px;
      }
      .hover-guide {
        stroke: #8ca3d4;
        stroke-width: 1.5;
        stroke-dasharray: 4 5;
      }
      .hover-readout {
        margin-top: 0.55rem;
        border: 1px solid #2f4268;
        border-radius: 10px;
        padding: 0.55rem 0.65rem;
        background: #10182a66;
        font-size: 1.2rem;
      }
      .hover-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .hover-row strong {
        margin-left: auto;
      }
      .table-wrap {
        max-height: 520px;
        overflow-y: auto;
        overflow-x: auto;
        border: 1px solid #243457;
        border-radius: 10px;
      }
      @media (max-width: 720px) {
        .site { padding: 0.75rem; }
        .tabs {
          gap: 0.5rem;
          padding: 0.6rem 0.6rem 0.25rem;
        }
        .workspace-body {
          padding: 0.75rem;
        }
        .mortgage-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body></body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Aus Fin</title>
    <link data-trunk rel="copy-file" href="static/favicon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link data-trunk rel="rust" data-bin="aus-fin" data-wasm-opt="z" />
    <style>
      :root {
        --bg: #0b0b09;
        --surface: #11110e;
        --panel: #161613;
        --ink: #d6d3c4;
        --muted: #8a8672;
        --line: #33322a;
        --line-strong: #4c4a3a;
        --field: #0d0d0b;
        --field-border: #3c3a2e;
        --accent: #ffb000;
        --accent-dim: #8a6200;
        --accent-ink: #141200;
        --error: #e06c75;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Berkeley Mono", "JetBrains Mono", "IBM Plex Mono", ui-monospace,
          "SF Mono", Menlo, Consolas, monospace;
        font-size: 13.5px;
        line-height: 1.5;
        color: var(--ink);
        background: var(--bg);
        font-variant-numeric: tabular-nums;
        -webkit-tap-highlight-color: transparent;
      }
      ::selection {
        background: var(--accent);
        color: var(--accent-ink);
      }
      h1 {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-left: 3px solid var(--accent);
        padding-left: 0.6rem;
        margin: 0.4rem 0;
      }
      h2 {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        border-bottom: 1px solid var(--line);
        padding-bottom: 0.35rem;
        margin: 0.4rem 0 0.7rem;
      }
      h2::before, h3::before {
        content: "// ";
        color: var(--accent-dim);
      }
      h3 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin: 1rem 0 0.5rem;
      }
      p {
        margin: 0.3rem 0 0.8rem;
      }
      .site {
        max-width: 1120px;
        margin: 0 auto;
        padding: 1.1rem;
        padding-top: calc(1.1rem + env(safe-area-inset-top, 0px));
      }
      .tabs {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
        margin: 0;
        padding: 0;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .tabs button {
        text-decoration: none;
        color: var(--muted);
        border: 0;
        border-right: 1px solid var(--line);
        border-radius: 0;
        padding: 0.5rem 0.9rem;
        background: transparent;
        text-transform: uppercase;
        font-size: 0.78rem;
        font-weight: 400;
        letter-spacing: 0.06em;
      }
      .tabs .tab-label-short {
        display: none;
      }
      .tabs button:hover {
        color: var(--ink);
        background: #1c1c17;
      }
      .tabs button[aria-current="page"] {
        background: var(--accent);
        color: var(--accent-ink);
        font-weight: 700;
      }
      .workspace {
        border: 1px solid var(--line);
      }
      .workspace-body {
        background: var(--surface);
        padding: 0.95rem 1rem;
      }
      .hero {
        margin-bottom: 0.75rem;
      }
      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .hero-actions {
        display: flex;
        gap: 0.6rem;
      }
      .hero p {
        font-size: 0.85rem;
      }
      .income-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(min(320px, 100%), 1fr));
        align-items: start;
      }
      .panel {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(min(300px, 100%), 1fr));
      }
      .field-group {
        padding: 0.35rem 0 1.1rem;
        border-bottom: 1px dashed var(--line);
      }
      .field-group:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin-bottom: 0.3rem;
      }
      .check-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.2rem 0 0.9rem;
        font-weight: 600;
      }
      input, select {
        width: 100%;
        font: inherit;
        padding: 0.4rem 0.5rem;
        border-radius: 0;
        border: 1px solid var(--field-border);
        background: var(--field);
        color: var(--ink);
        margin-bottom: 0.9rem;
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
      }
      input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin: 0;
        accent-color: var(--accent);
      }
      button {
        font: inherit;
        background: var(--accent);
        color: var(--accent-ink);
        border: 1px solid var(--accent);
        border-radius: 0;
        padding: 0.35rem 0.7rem;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        touch-action: manipulation;
      }
      button:hover {
        background: #ffc23d;
        border-color: #ffc23d;
      }
      button.secondary {
        background: transparent;
        color: var(--ink);
        border-color: var(--line-strong);
      }
      button.secondary:hover {
        background: #1c1c17;
        border-color: var(--muted);
      }
      .button-row {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      th {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        border-bottom: 1px solid var(--line-strong);
      }
      th, td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 0.35rem 0.45rem;
      }
      tbody tr:hover {
        background: #1a1a14;
      }
      .muted {
        color: var(--muted);
      }
      .badge {
        color: var(--accent);
        background: transparent;
        border: 1px solid var(--accent);
        display: inline-block;
        padding: 0.1rem 0.45rem;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .error {
        color: var(--error);
        margin: 0.25rem 0 1rem;
      }
      .warning-list {
        margin: 0.4rem 0 0.9rem;
        padding-left: 1.2rem;
        color: var(--error);
        font-size: 0.85rem;
      }
      /* minmax(0, …) lets the tracks shrink below their content's min width;
         plain fr units would inherit wide grids/tables and blow out the page. */
      .mortgage-layout {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
        align-items: start;
      }
      /* Horizontal scroll for tables that sit outside a .table-wrap. */
      .table-scroll {
        overflow-x: auto;
      }
      .row-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
      }
      /* min(Npx, 100%) keeps auto-fit grids from forcing a wider-than-viewport
         min-content width on narrow screens (one N px column per item). */
      .three-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(170px, 100%), 1fr));
        gap: 0.7rem;
      }
      .four-col {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
        gap: 0.7rem;
      }
      .split-block {
        border: 1px solid var(--line);
        padding: 0.7rem;
        margin-bottom: 0.8rem;
        background: var(--panel);
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(170px, 100%), 1fr));
        gap: 0.5rem;
        margin-bottom: 0.8rem;
      }
      .mini-card {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        border: 1px solid var(--line);
        padding: 0.5rem 0.6rem;
        background: var(--panel);
      }
      .mini-card .muted {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .mini-card strong {
        font-size: 1rem;
        color: var(--accent);
      }
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.7rem;
      }
      .chart-block {
        padding: 0.25rem 0;
      }
      .line-chart {
        width: 100%;
        height: auto;
      }
      .axis {
        stroke: var(--line-strong);
        stroke-width: 1;
      }
      .axis-grid {
        stroke: #24231d;
        stroke-width: 1;
        stroke-dasharray: 1 4;
      }
      .series-line {
        stroke-width: 2;
        stroke-linecap: butt;
        stroke-linejoin: miter;
      }
      .axis-label {
        fill: var(--muted);
        font-size: 17px;
        font-weight: 600;
      }
      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-bottom: 0.55rem;
      }
      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 1rem;
        color: var(--muted);
      }
      .chart-toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem 0.9rem;
        margin: 0.2rem 0 0.55rem;
      }
      .chart-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.42rem;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .chart-toggle input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .chart-toggles.in-readout {
        margin: 0.5rem 0 0.65rem;
      }
      .legend-swatch {
        width: 10px;
        height: 10px;
      }
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .info-tip {
        position: relative;
        display: inline-block;
        color: var(--muted);
        cursor: help;
        margin-left: 0.4rem;
        font-size: 0.85em;
        text-transform: none;
        letter-spacing: normal;
      }
      .info-tip:hover,
      .info-tip:focus {
        color: var(--accent);
        outline: none;
      }
      .info-tip-body {
        display: none;
        position: absolute;
        left: 0;
        bottom: 1.5em;
        z-index: 10;
        width: 320px;
        max-width: 72vw;
        background: var(--panel);
        border: 1px solid var(--line-strong);
        padding: 0.5rem 0.6rem;
        color: var(--ink);
        font-size: 0.95em;
        font-weight: 400;
        text-transform: none;
        letter-spacing: normal;
        white-space: normal;
        line-height: 1.45;
      }
      .info-tip:hover .info-tip-body,
      .info-tip:focus .info-tip-body {
        display: block;
      }
      details.fine-print summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0.6rem 0 0.3rem;
      }
      details.collapsible > summary {
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      details.collapsible > summary::-webkit-details-marker {
        display: none;
      }
      details.collapsible > summary h2,
      details.collapsible > summary h3 {
        margin: 0.5rem 0;
      }
      /* Collapse indicator sits at the right edge of the heading line:
         points at the title when closed, down at the content when open. */
      details.collapsible > summary::after {
        content: "<";
        color: var(--muted);
        font-weight: 700;
        margin-left: auto;
        padding-left: 0.5rem;
      }
      details.collapsible[open] > summary::after {
        content: "v";
      }
      details.collapsible > summary:hover::after,
      details.collapsible > summary:focus-visible::after {
        color: var(--accent);
      }
      .pie-wrap {
        display: flex;
        gap: 1.2rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .pie-chart {
        width: 240px;
        height: 240px;
        flex: 0 0 auto;
      }
      .pie-slice {
        stroke: var(--bg);
        stroke-width: 2;
      }
      .pie-legend {
        margin-top: 0;
        min-width: 300px;
        flex: 1;
      }
      .pie-note {
        font-size: 0.78rem;
        margin: 0.6rem 0 0;
      }
      .budget-table input,
      .budget-table select {
        margin-bottom: 0;
        min-width: 7rem;
      }
      .budget-table td {
        vertical-align: middle;
      }
      /* Touch drag on the chart scrubs the readout; vertical swipes still scroll. */
      .hover-capture {
        touch-action: pan-y;
      }
      .hover-guide {
        stroke: var(--muted);
        stroke-width: 1;
        stroke-dasharray: 3 4;
      }
      .hover-readout {
        margin-top: 0.55rem;
        border: 1px solid var(--line);
        padding: 0.5rem 0.6rem;
        background: var(--panel);
        font-size: 0.95rem;
      }
      .hover-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .hover-row strong {
        margin-left: auto;
      }
      .table-wrap {
        max-height: 520px;
        overflow-y: auto;
        overflow-x: auto;
        border: 1px solid var(--line);
      }
      .spreadsheet-wrap {
        max-height: 600px;
        overflow: auto;
        border: 1px solid var(--line);
      }
      .spreadsheet-wrap table {
        white-space: nowrap;
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: var(--surface);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line-strong);
        border: 2px solid var(--surface);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }
      .spreadsheet-wrap thead th {
        position: sticky;
        top: 0;
        background: var(--surface);
        z-index: 1;
      }
      /* Touch devices: bigger hit areas, 16px fields so mobile browsers don't zoom on focus. */
      @media (pointer: coarse) {
        button {
          min-height: 44px;
          padding: 0.5rem 0.8rem;
        }
        input, select {
          min-height: 44px;
          font-size: 16px;
        }
        input[type="checkbox"] {
          width: 1.35rem;
          height: 1.35rem;
          min-height: 0;
        }
        .tabs button {
          min-height: 48px;
        }
        .info-tip {
          padding: 0.25rem 0.4rem;
        }
      }
      @media (max-width: 720px) {
        .site {
          padding: 0.75rem;
          padding-top: calc(0.75rem + env(safe-area-inset-top, 0px));
          padding-left: calc(0.75rem + env(safe-area-inset-left, 0px));
          padding-right: calc(0.75rem + env(safe-area-inset-right, 0px));
          padding-bottom: calc(0.75rem + env(safe-area-inset-bottom, 0px));
        }
        /* All five tabs share one fixed row using compact labels. */
        .tabs {
          flex-wrap: nowrap;
        }
        .tabs button {
          flex: 1 1 0;
          min-width: 0;
          white-space: nowrap;
          text-align: center;
          padding: 0.5rem 0.15rem;
          font-size: 0.72rem;
          letter-spacing: 0.03em;
        }
        .tabs button:last-child {
          border-right: 0;
        }
        .tabs .tab-label-full {
          display: none;
        }
        .tabs .tab-label-short {
          display: inline;
        }
        .workspace-body {
          padding: 0.75rem;
        }
        .mortgage-layout {
          grid-template-columns: minmax(0, 1fr);
        }
        .pie-wrap {
          justify-content: center;
        }
        .pie-legend {
          min-width: 0;
          /* flex-basis beats width on flex items; 100% basis wraps the
             legend onto its own full-width row below the pie. */
          flex: 1 1 100%;
        }
        .table-wrap, .spreadsheet-wrap {
          max-height: 65vh;
        }
        /* Tooltips become a fixed bottom readout so they never overflow the screen. */
        .info-tip-body {
          position: fixed;
          left: 0.75rem;
          right: 0.75rem;
          bottom: calc(0.75rem + env(safe-area-inset-bottom));
          top: auto;
          width: auto;
          max-width: none;
          z-index: 100;
        }
      }
    </style>
  </head>
  <body></body>
</html>
